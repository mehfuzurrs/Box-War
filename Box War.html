</head>
<body>
    <table>
        <tr>
            <td>
                <button id = '1' height = "60" width = "60" onclick="buttonClicked(1)">&nbsp;&nbsp;</button>
            </td>
            <td>
                <button id = '2' height = "60" width = "60" onclick="buttonClicked(2)">&nbsp;&nbsp;</button>
            </td>
            <td>
                <button id = '3' height = "60" width = "60" onclick="buttonClicked(3)">&nbsp;&nbsp;</button>
            </td>
        </tr>
        <tr>
            <td>
                <button id = '4' height = "60" width = "60" onclick="buttonClicked(4)">&nbsp;&nbsp;</button>

            </td>
        </tr>
    </table>

    <script>
        var turncounter = 1
        function buttonClicked(id){
            if(turncounter % 2 == 0){
                document.getElementById(id).innerHTML = "o"
            }
            else{
            document.getElementById(id).innerHTML = "x"
            }
            turncounter++
        }
    </script>
